<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Helicopter — GitCade</title>
    <!-- Inline favicon so a missing /favicon.ico never logs a console 404. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230b0b16'/%3E%3Crect x='2' y='6' width='12' height='4' rx='1' fill='%23ffcd75'/%3E%3C/svg%3E" />
    <style>
      :root { --bg: #07060c; --ink: #f4f4f4; --accent: #ffcd75; --indigo: #3b5dc9; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; background: var(--bg); color: var(--ink);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        display: grid; place-items: center; overflow: hidden;
      }
      #stage {
        position: relative; width: 800px; height: 600px;
        max-width: 100vw; max-height: 100vh; aspect-ratio: 4 / 3;
        /* Clip the canvas overhang during screen-shake, and match the canvas bg so the
           thin gap a shake exposes blends in instead of flashing the page behind. */
        overflow: hidden; background: #0b0b16;
      }
      #game {
        position: absolute; inset: 0; width: 100%; height: 100%;
        image-rendering: pixelated; touch-action: none; background: #0b0b16;
        will-change: transform;
      }
      /* Screen-effects overlay (flash/fade) — driven by attachScreenEffects. */
      #fx-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
      /* Pause button, always available during play. */
      #pause-btn {
        position: absolute; top: 8px; right: 8px; z-index: 5;
        width: 40px; height: 40px; border: 0; border-radius: 8px;
        background: rgba(59,93,201,.55); color: var(--ink); font-size: 18px;
        cursor: pointer; touch-action: manipulation;
      }
      /* Mute toggle (top-left, mirrors the pause button; also the M key). */
      #mute-btn {
        position: absolute; top: 8px; left: 8px; z-index: 5;
        width: 40px; height: 40px; border: 0; border-radius: 8px;
        background: rgba(59,93,201,.55); color: var(--ink); font-size: 18px;
        cursor: pointer; touch-action: manipulation;
      }
      /* Pause overlay. The title / play / game-over screens are DATA now (canvas
         scenes wired by scene `flow`); only pause remains a host-loop concern. */
      #pause-overlay {
        position: absolute; inset: 0; z-index: 10; display: none; place-items: center;
        background: rgba(7,6,12,.72); backdrop-filter: blur(2px); text-align: center;
      }
      #pause-overlay .card {
        background: #14162a; border: 2px solid var(--indigo); border-radius: 14px;
        padding: 24px 32px; box-shadow: 0 10px 40px rgba(0,0,0,.5);
      }
      #pause-overlay h1 { margin: 0 0 8px; font-size: 36px; color: var(--accent); letter-spacing: 2px; }
      #pause-overlay p { margin: 0; font-size: 13px; opacity: .6; }
      /* Mobile touch pad — only on coarse-pointer (touch) devices. */
      #touch {
        position: absolute; left: 0; right: 0; bottom: 0; height: 190px; z-index: 4;
        display: none; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
        gap: 8px; padding: 10px 14px 16px; pointer-events: none;
      }
      #touch .tbtn {
        pointer-events: auto; border: 0; border-radius: 14px;
        background: rgba(59,93,201,.5); color: var(--ink); font-size: 26px;
        opacity: .8; touch-action: none; user-select: none;
      }
      #touch .tbtn:active { opacity: 1; }
      @media (pointer: coarse) { #touch { display: grid; } }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game" width="800" height="600"></canvas>
      <div id="fx-overlay"></div>
      <button id="pause-btn" aria-label="Pause">II</button>
      <button id="mute-btn" aria-label="Mute audio">🔊</button>
      <div id="touch"></div>
      <div id="pause-overlay">
        <div class="card">
          <h1>Paused</h1>
          <p>Press P or Esc to resume</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
