<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Idle Clicker — GitCade</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%23ffcd75'/%3E%3C/svg%3E" />
    <style>
      :root { --bg: #07060c; --ink: #f4f4f4; --accent: #ffcd75; --indigo: #3b5dc9; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink); font-family: ui-monospace, "SF Mono", Menlo, monospace; display: grid; place-items: center; overflow: hidden; }
      /* overflow:hidden clips the canvas overhang during screen-shake; the matching bg makes the thin exposed gap blend in. */
      #stage { position: relative; width: 800px; height: 600px; max-width: 100vw; max-height: 100vh; aspect-ratio: 4 / 3; overflow: hidden; background: #0b0b16; }
      #game { position: absolute; inset: 0; width: 100%; height: 100%; image-rendering: pixelated; touch-action: none; background: #0b0b16; will-change: transform; cursor: pointer; }
      #fx-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
      /* Mute toggle (top-left; also the M key). */
      #mute-btn { position: absolute; top: 8px; left: 8px; z-index: 5; width: 40px; height: 40px; border: 0; border-radius: 8px; background: rgba(59,93,201,.55); color: var(--ink); font-size: 18px; cursor: pointer; touch-action: manipulation; }
      /* Shop bar — upgrades + prestige; the only HTML chrome (rich cost labels). */
      #idlebar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 3; display: flex; gap: 6px; padding: 8px; background: linear-gradient(transparent, rgba(7,6,12,.85)); pointer-events: none; }
      #idlebar button { pointer-events: auto; flex: 1; min-height: 56px; border: 0; border-radius: 10px; background: #2a2f50; color: var(--ink); font: inherit; font-size: 13px; cursor: pointer; touch-action: manipulation; line-height: 1.3; }
      #idlebar button b { display: block; color: var(--accent); font-size: 15px; }
      #idlebar button#prestige-btn { background: #5a2f50; flex: 0 0 90px; }
      #idlebar button#prestige-btn b { color: #ef7d57; }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game" width="800" height="600"></canvas>
      <div id="fx-overlay"></div>
      <button id="mute-btn" aria-label="Mute audio">🔊</button>
      <div id="idlebar">
        <!-- Cost labels are filled from config.json at runtime (see updateShop in main.ts) — no hardcoded prices. -->
        <button data-up="click"><b>Stronger tap</b>…</button>
        <button data-up="cursor"><b>Cursor</b>…</button>
        <button data-up="factory"><b>Factory</b>…</button>
        <button id="prestige-btn"><b>Prestige</b>reset</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
