<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Survival Arena — GitCade</title>
    <style>
      :root { --bg: #07060c; --ink: #f4f4f4; --accent: #ffcd75; --indigo: #3b5dc9; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; background: var(--bg); color: var(--ink);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        display: grid; place-items: center; overflow: hidden;
      }
      #stage {
        position: relative; width: 800px; height: 600px;
        max-width: 100vw; max-height: 100vh; aspect-ratio: 4 / 3;
      }
      #game {
        position: absolute; inset: 0; width: 100%; height: 100%;
        image-rendering: pixelated; touch-action: none; background: #0b0b16;
        will-change: transform;
      }
      /* Screen-effects overlay (flash/fade) — driven by attachScreenEffects. */
      #fx-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
      /* Pause button, always available during play. */
      #pause-btn {
        position: absolute; top: 8px; right: 8px; z-index: 5;
        width: 40px; height: 40px; border: 0; border-radius: 8px;
        background: rgba(59,93,201,.55); color: var(--ink); font-size: 18px;
        cursor: pointer; touch-action: manipulation;
      }
      /* Menu overlay (title / pause / game-over cards). */
      #menu {
        position: absolute; inset: 0; z-index: 10; display: grid; place-items: center;
        background: rgba(7,6,12,.72); backdrop-filter: blur(2px); text-align: center;
      }
      #menu .card {
        background: #14162a; border: 2px solid var(--indigo); border-radius: 14px;
        padding: 28px 32px; max-width: 86%; box-shadow: 0 10px 40px rgba(0,0,0,.5);
      }
      #menu h1 { margin: 0 0 6px; font-size: 40px; color: var(--accent); letter-spacing: 2px; }
      #menu .tag { margin: 0 0 14px; opacity: .8; }
      #menu .outcome { font-size: 22px; margin: 4px 0 18px; }
      #menu ul.howto { text-align: left; margin: 0 auto 18px; padding-left: 20px; max-width: 320px; opacity: .85; line-height: 1.5; }
      #menu .hint { margin-top: 14px; font-size: 12px; opacity: .55; }
      #menu button {
        display: block; width: 100%; margin: 8px 0 0; padding: 12px 18px;
        font: inherit; font-size: 18px; border: 0; border-radius: 10px;
        background: #2a2f50; color: var(--ink); cursor: pointer; touch-action: manipulation;
      }
      #menu button.primary { background: var(--accent); color: #1a1320; font-weight: 700; }
      /* Mobile touch pad — only on coarse-pointer (touch) devices. */
      #touch {
        position: absolute; left: 0; right: 0; bottom: 0; height: 190px; z-index: 4;
        display: none; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
        gap: 8px; padding: 10px 14px 16px; pointer-events: none;
      }
      #touch .tbtn {
        pointer-events: auto; border: 0; border-radius: 14px;
        background: rgba(59,93,201,.5); color: var(--ink); font-size: 26px;
        opacity: .8; touch-action: none; user-select: none;
      }
      #touch .tbtn:active { opacity: 1; }
      @media (pointer: coarse) { #touch { display: grid; } }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game" width="800" height="600"></canvas>
      <div id="fx-overlay"></div>
      <button id="pause-btn" aria-label="Pause">II</button>
      <div id="touch"></div>
      <div id="menu"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
