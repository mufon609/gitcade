<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230b0b16'/%3E%3Crect x='5' y='4' width='6' height='8' rx='1' fill='%233b5dc9'/%3E%3Crect x='6' y='2' width='4' height='3' fill='%23ffcd75'/%3E%3C/svg%3E" />
    <title>Tower Defense — GitCade</title>
    <style>
      :root { --bg: #07060c; --ink: #f4f4f4; --accent: #ffcd75; --indigo: #3b5dc9; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; background: var(--bg); color: var(--ink);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        display: grid; place-items: center; overflow: hidden;
      }
      /* overflow:hidden clips the canvas overhang during screen-shake; the matching bg makes the thin exposed gap blend in. */
      #stage { position: relative; width: 800px; height: 600px; max-width: 100vw; max-height: 100vh; aspect-ratio: 4 / 3; overflow: hidden; background: #0b0b16; }
      #game { position: absolute; inset: 0; width: 100%; height: 100%; image-rendering: pixelated; touch-action: none; background: #0b0b16; will-change: transform; }
      #fx-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0; }
      /* Upgrade bar — host chrome shown during the play scene (toggled from main.ts). */
      #tdbar {
        position: absolute; left: 0; right: 0; bottom: 0; z-index: 3;
        display: flex; gap: 6px; align-items: stretch; padding: 8px;
        background: linear-gradient(transparent, rgba(7,6,12,.85)); pointer-events: none;
      }
      #tdbar button {
        pointer-events: auto; flex: 1; min-height: 52px; border: 0; border-radius: 10px;
        background: #2a2f50; color: var(--ink); font: inherit; font-size: 13px; cursor: pointer;
        touch-action: manipulation; line-height: 1.3;
      }
      #tdbar button b { display: block; color: var(--accent); font-size: 15px; }
      /* Pause button, always available during play. */
      #pause-btn {
        position: absolute; top: 8px; right: 8px; z-index: 5;
        width: 40px; height: 40px; border: 0; border-radius: 8px;
        background: rgba(59,93,201,.55); color: var(--ink); font-size: 18px;
        cursor: pointer; touch-action: manipulation;
      }
      #pause-overlay {
        position: absolute; inset: 0; z-index: 10; display: none; place-items: center;
        background: rgba(7,6,12,.72); backdrop-filter: blur(2px); text-align: center;
      }
      #pause-overlay .card {
        background: #14162a; border: 2px solid var(--indigo); border-radius: 14px;
        padding: 24px 32px; box-shadow: 0 10px 40px rgba(0,0,0,.5);
      }
      #pause-overlay h1 { margin: 0 0 8px; font-size: 36px; color: var(--accent); letter-spacing: 2px; }
      #pause-overlay p { margin: 0; font-size: 13px; opacity: .6; }
      /* Mute toggle (top-left, mirrors the pause button; also the M key). */
      #mute-btn {
        position: absolute; top: 8px; left: 8px; z-index: 5;
        width: 40px; height: 40px; border: 0; border-radius: 8px;
        background: rgba(59,93,201,.55); color: var(--ink); font-size: 18px;
        cursor: pointer; touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game" width="800" height="600"></canvas>
      <div id="fx-overlay"></div>
      <button id="pause-btn" aria-label="Pause">II</button>
      <button id="mute-btn" aria-label="Mute audio">🔊</button>
      <div id="pause-overlay">
        <div class="card">
          <h1>Paused</h1>
          <p>Press P or Esc to resume</p>
        </div>
      </div>
      <div id="tdbar" style="display:none">
        <button data-up="range"><b>Range +</b>75g</button>
        <button data-up="firerate"><b>Fire rate +</b>90g</button>
        <button data-up="bounty"><b>Bounty +</b>100g</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
